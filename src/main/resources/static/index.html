<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Salón de Fiestas — Admin</title>

  <!-- Bootstrap 5 -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <!-- Bootstrap Icons -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet"/>
  <!-- Leaflet -->
  <link href="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.min.css" rel="stylesheet"/>
  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet"/>

  <style>
    :root {
      --bg-base:       #0c0e14;
      --bg-surface:    #13151f;
      --bg-card:       #1a1d2b;
      --bg-hover:      #20243a;
      --border:        #2a2e45;
      --accent:        #e8a045;
      --accent-dim:    rgba(232,160,69,.15);
      --accent2:       #5b7fe8;
      --accent2-dim:   rgba(91,127,232,.15);
      --success:       #3ecf8e;
      --danger:        #e85b5b;
      --warning:       #e8c45b;
      --text-primary:  #edeef5;
      --text-secondary:#8b8fa8;
      --text-muted:    #555970;
      --sidebar-w:     260px;
      --topbar-h:      64px;
      --radius:        12px;
      --radius-sm:     8px;
      --font-display:  'Syne', sans-serif;
      --font-mono:     'DM Mono', monospace;
      --transition:    .2s cubic-bezier(.4,0,.2,1);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg-base);
      color: var(--text-primary);
      font-family: var(--font-display);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ── Scrollbar ─────────────────────────────────────────────── */
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: var(--bg-base); }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 99px; }

    /* ── Sidebar ───────────────────────────────────────────────── */
    #sidebar {
      position: fixed; top: 0; left: 0; bottom: 0;
      width: var(--sidebar-w);
      background: var(--bg-surface);
      border-right: 1px solid var(--border);
      display: flex; flex-direction: column;
      z-index: 100;
      transition: transform var(--transition);
    }

    .sidebar-logo {
      padding: 24px 20px 16px;
      border-bottom: 1px solid var(--border);
    }
    .sidebar-logo .logo-icon {
      width: 38px; height: 38px;
      background: var(--accent);
      border-radius: 10px;
      display: inline-flex; align-items: center; justify-content: center;
      font-size: 18px; color: #0c0e14; font-weight: 800;
      margin-right: 10px;
    }
    .sidebar-logo .logo-text {
      font-size: 15px; font-weight: 700; letter-spacing: .02em;
      line-height: 1.2;
    }
    .sidebar-logo .logo-sub {
      font-size: 11px; color: var(--text-muted); font-family: var(--font-mono);
      letter-spacing: .08em; text-transform: uppercase;
    }

    .sidebar-nav { flex: 1; padding: 16px 12px; overflow-y: auto; }

    .nav-section-label {
      font-size: 10px; letter-spacing: .12em; text-transform: uppercase;
      color: var(--text-muted); font-family: var(--font-mono);
      padding: 12px 8px 6px;
    }

    .nav-item { margin-bottom: 2px; }
    .nav-link {
      display: flex; align-items: center; gap: 10px;
      padding: 10px 12px; border-radius: var(--radius-sm);
      color: var(--text-secondary); font-size: 14px; font-weight: 600;
      text-decoration: none; cursor: pointer;
      transition: background var(--transition), color var(--transition);
      border: none; background: none; width: 100%; text-align: left;
    }
    .nav-link i { font-size: 16px; width: 18px; flex-shrink: 0; }
    .nav-link:hover { background: var(--bg-hover); color: var(--text-primary); }
    .nav-link.active {
      background: var(--accent-dim);
      color: var(--accent);
    }
    .nav-link .badge-count {
      margin-left: auto;
      background: var(--accent-dim); color: var(--accent);
      font-size: 10px; font-family: var(--font-mono);
      padding: 2px 7px; border-radius: 99px;
    }

    .sidebar-footer {
      padding: 16px 12px;
      border-top: 1px solid var(--border);
    }
    .sidebar-footer .user-info {
      display: flex; align-items: center; gap: 10px;
      padding: 10px 12px; border-radius: var(--radius-sm);
      background: var(--bg-card);
    }
    .user-avatar {
      width: 32px; height: 32px; border-radius: 8px;
      background: var(--accent2-dim); border: 1px solid var(--accent2);
      display: flex; align-items: center; justify-content: center;
      font-size: 13px; color: var(--accent2); font-weight: 700;
    }
    .user-name { font-size: 13px; font-weight: 600; line-height: 1.2; }
    .user-role { font-size: 11px; color: var(--text-muted); font-family: var(--font-mono); }

    /* ── Topbar ────────────────────────────────────────────────── */
    #topbar {
      position: fixed; top: 0; left: var(--sidebar-w); right: 0;
      height: var(--topbar-h);
      background: var(--bg-surface);
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; padding: 0 28px;
      gap: 16px; z-index: 99;
    }
    #topbar .page-title {
      font-size: 18px; font-weight: 700; flex: 1;
    }
    #topbar .topbar-actions { display: flex; align-items: center; gap: 8px; }
    .topbar-btn {
      width: 36px; height: 36px; border-radius: var(--radius-sm);
      border: 1px solid var(--border); background: var(--bg-card);
      color: var(--text-secondary); display: flex; align-items: center;
      justify-content: center; cursor: pointer; font-size: 16px;
      transition: all var(--transition);
    }
    .topbar-btn:hover { border-color: var(--accent); color: var(--accent); }

    /* API status dot */
    .api-status {
      display: flex; align-items: center; gap: 7px;
      font-size: 12px; color: var(--text-muted); font-family: var(--font-mono);
    }
    .api-status .dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: var(--success);
      box-shadow: 0 0 6px var(--success);
      animation: pulse 2s infinite;
    }
    .api-status .dot.offline { background: var(--danger); box-shadow: 0 0 6px var(--danger); }
    @keyframes pulse {
      0%,100% { opacity: 1; } 50% { opacity: .4; }
    }

    /* ── Main content ──────────────────────────────────────────── */
    #main {
      margin-left: var(--sidebar-w);
      padding-top: var(--topbar-h);
      min-height: 100vh;
    }
    .content-area {
      padding: 28px;
      animation: fadeIn .25s ease;
    }
    @keyframes fadeIn { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }

    /* ── Cards ─────────────────────────────────────────────────── */
    .card-dark {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px;
    }
    .card-dark .card-header-custom {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 18px;
    }
    .card-dark .card-title {
      font-size: 15px; font-weight: 700;
    }

    /* ── Stat cards ────────────────────────────────────────────── */
    .stat-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px 22px;
      position: relative; overflow: hidden;
      transition: border-color var(--transition), transform var(--transition);
    }
    .stat-card:hover { border-color: var(--accent); transform: translateY(-2px); }
    .stat-card .stat-icon {
      width: 42px; height: 42px; border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 20px; margin-bottom: 12px;
    }
    .stat-card .stat-value {
      font-size: 28px; font-weight: 800; line-height: 1;
      font-family: var(--font-mono);
    }
    .stat-card .stat-label {
      font-size: 12px; color: var(--text-muted); margin-top: 4px;
      text-transform: uppercase; letter-spacing: .08em;
    }
    .stat-card .stat-delta {
      font-size: 12px; font-family: var(--font-mono);
      margin-top: 8px;
    }
    .stat-card::after {
      content: ''; position: absolute; top: 0; right: 0;
      width: 80px; height: 80px; border-radius: 50%;
      opacity: .06; transform: translate(20px,-20px);
    }
    .stat-accent  .stat-icon { background: var(--accent-dim);  color: var(--accent); }
    .stat-accent::after  { background: var(--accent); }
    .stat-blue    .stat-icon { background: var(--accent2-dim); color: var(--accent2); }
    .stat-blue::after    { background: var(--accent2); }
    .stat-green   .stat-icon { background: rgba(62,207,142,.12); color: var(--success); }
    .stat-green::after   { background: var(--success); }
    .stat-red     .stat-icon { background: rgba(232,91,91,.12);  color: var(--danger); }
    .stat-red::after     { background: var(--danger); }

    /* ── Table ─────────────────────────────────────────────────── */
    .table-dark-custom {
      width: 100%; border-collapse: separate; border-spacing: 0;
      font-size: 13.5px;
    }
    .table-dark-custom thead th {
      background: var(--bg-surface);
      color: var(--text-muted); font-size: 11px;
      text-transform: uppercase; letter-spacing: .1em;
      font-family: var(--font-mono); font-weight: 500;
      padding: 10px 14px; border-bottom: 1px solid var(--border);
    }
    .table-dark-custom tbody tr {
      transition: background var(--transition);
      border-bottom: 1px solid var(--border);
    }
    .table-dark-custom tbody tr:last-child td { border-bottom: none; }
    .table-dark-custom tbody tr:hover { background: var(--bg-hover); }
    .table-dark-custom tbody td {
      padding: 12px 14px; color: var(--text-primary); vertical-align: middle;
      border-bottom: 1px solid var(--border);
    }

    /* ── Badges ────────────────────────────────────────────────── */
    .badge-custom {
      padding: 4px 10px; border-radius: 99px;
      font-size: 11px; font-family: var(--font-mono); font-weight: 500;
    }
    .badge-pendiente  { background: rgba(232,196,91,.12); color: var(--warning); }
    .badge-confirmada { background: rgba(62,207,142,.12);  color: var(--success); }
    .badge-cancelada  { background: rgba(232,91,91,.12);   color: var(--danger); }
    .badge-finalizada { background: var(--accent2-dim);    color: var(--accent2); }
    .badge-activo     { background: rgba(62,207,142,.12);  color: var(--success); }
    .badge-inactivo   { background: rgba(232,91,91,.12);   color: var(--danger); }
    .badge-mantenimiento { background: rgba(232,196,91,.12); color: var(--warning); }

    /* ── Buttons ───────────────────────────────────────────────── */
    .btn-accent {
      background: var(--accent); color: #0c0e14;
      border: none; border-radius: var(--radius-sm);
      padding: 8px 18px; font-size: 13px; font-weight: 700;
      font-family: var(--font-display); cursor: pointer;
      transition: opacity var(--transition), transform var(--transition);
      display: inline-flex; align-items: center; gap: 7px;
    }
    .btn-accent:hover { opacity: .88; transform: translateY(-1px); }

    .btn-outline-custom {
      background: transparent; color: var(--text-secondary);
      border: 1px solid var(--border); border-radius: var(--radius-sm);
      padding: 7px 14px; font-size: 13px; font-weight: 600;
      font-family: var(--font-display); cursor: pointer;
      transition: all var(--transition);
      display: inline-flex; align-items: center; gap: 6px;
    }
    .btn-outline-custom:hover { border-color: var(--text-secondary); color: var(--text-primary); }

    .btn-icon {
      width: 30px; height: 30px; border-radius: 7px;
      border: 1px solid var(--border); background: var(--bg-surface);
      color: var(--text-muted); display: inline-flex;
      align-items: center; justify-content: center;
      cursor: pointer; font-size: 13px;
      transition: all var(--transition);
    }
    .btn-icon:hover { border-color: var(--accent); color: var(--accent); }
    .btn-icon.danger:hover { border-color: var(--danger); color: var(--danger); }

    /* ── Forms ─────────────────────────────────────────────────── */
    .form-control-dark, .form-select-dark {
      background: var(--bg-surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text-primary);
      padding: 9px 13px; font-size: 13.5px;
      font-family: var(--font-display); width: 100%;
      transition: border-color var(--transition);
    }
    .form-control-dark:focus, .form-select-dark:focus {
      outline: none; border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-dim);
    }
    .form-control-dark::placeholder { color: var(--text-muted); }
    .form-select-dark option { background: var(--bg-card); }
    .form-label-dark {
      font-size: 12px; font-weight: 600; color: var(--text-secondary);
      text-transform: uppercase; letter-spacing: .06em;
      margin-bottom: 6px; display: block;
    }

    /* ── Modal ─────────────────────────────────────────────────── */
    .modal-dark .modal-content {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text-primary);
    }
    .modal-dark .modal-header {
      border-bottom: 1px solid var(--border);
      padding: 18px 22px;
    }
    .modal-dark .modal-title { font-weight: 700; font-size: 16px; }
    .modal-dark .modal-body { padding: 22px; }
    .modal-dark .modal-footer {
      border-top: 1px solid var(--border);
      padding: 14px 22px;
    }
    .btn-close-white { filter: invert(1); opacity: .6; }
    .btn-close-white:hover { opacity: 1; }

    /* ── Toast ─────────────────────────────────────────────────── */
    #toast-container {
      position: fixed; bottom: 24px; right: 24px; z-index: 9999;
      display: flex; flex-direction: column; gap: 10px;
    }
    .toast-item {
      background: var(--bg-card); border: 1px solid var(--border);
      border-radius: var(--radius-sm); padding: 13px 18px;
      display: flex; align-items: center; gap: 12px;
      font-size: 13.5px; min-width: 280px;
      animation: slideIn .25s ease;
      box-shadow: 0 8px 32px rgba(0,0,0,.4);
    }
    .toast-item.success { border-left: 3px solid var(--success); }
    .toast-item.error   { border-left: 3px solid var(--danger); }
    .toast-item.info    { border-left: 3px solid var(--accent2); }
    @keyframes slideIn { from { transform: translateX(40px); opacity:0; } to { transform:translateX(0); opacity:1; } }

    /* ── Disponibilidad calendar grid ──────────────────────────── */
    .avail-result {
      display: grid; grid-template-columns: repeat(auto-fill, minmax(220px,1fr)); gap: 14px;
    }
    .avail-card {
      background: var(--bg-surface); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 16px;
      transition: border-color var(--transition);
    }
    .avail-card.disponible { border-color: var(--success); }
    .avail-card.bloqueado  { border-color: var(--danger); opacity: .6; }

    /* ── Section header ────────────────────────────────────────── */
    .section-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 22px;
    }
    .section-header h2 {
      font-size: 22px; font-weight: 800;
    }
    .section-header .sub {
      font-size: 13px; color: var(--text-muted); margin-top: 2px;
      font-family: var(--font-mono);
    }

    /* ── Empty state ───────────────────────────────────────────── */
    .empty-state {
      text-align: center; padding: 60px 20px;
      color: var(--text-muted);
    }
    .empty-state i { font-size: 42px; margin-bottom: 14px; display: block; }
    .empty-state p { font-size: 14px; }

    /* ── Loading spinner ───────────────────────────────────────── */
    .spinner-accent {
      width: 28px; height: 28px; border-radius: 50%;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      animation: spin .7s linear infinite;
      margin: 40px auto;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Responsive ────────────────────────────────────────────── */
    /* ── Mapa ─────────────────────────────────────────────────── */
    #map-container { height: 480px; border-radius: var(--radius); overflow: hidden; border: 1px solid var(--border); }
    .leaflet-popup-content-wrapper { background: var(--bg-card); color: var(--text-primary); border: 1px solid var(--border); border-radius: var(--radius-sm); }
    .leaflet-popup-tip { background: var(--bg-card); }
    .leaflet-popup-content { font-family: var(--font-display); font-size: 13px; }
    .map-salon-badge { display:inline-block; padding:3px 8px; border-radius:99px; font-size:11px; font-family:var(--font-mono); background:rgba(232,160,69,.15); color:#e8a045; margin-bottom:6px; }

    @media (max-width: 768px) {
      #sidebar { transform: translateX(-100%); }
      #sidebar.open { transform: translateX(0); }
      #main { margin-left: 0; }
      #topbar { left: 0; }
    }
  </style>
</head>
<body>

<!-- ══════════════════════════════════════════════════════════
     SIDEBAR
══════════════════════════════════════════════════════════ -->
<nav id="sidebar">
  <div class="sidebar-logo d-flex align-items-center">
    <span class="logo-icon">SF</span>
    <div>
      <div class="logo-text">Salón de Fiestas</div>
      <div class="logo-sub">Panel Admin</div>
    </div>
  </div>

  <div class="sidebar-nav">
    <div class="nav-section-label">Principal</div>
    <div class="nav-item">

      </button>
    </div>
    <div class="nav-item">
      <button class="nav-link" onclick="navigate('reservas')">

      <button class="nav-link" onclick="navigate('disponibilidad')">

      </button>
    </div>

    <div class="nav-item">
      <button class="nav-link" onclick="navigate('mapa')">
        <i class="bi bi-geo-alt-fill"></i> Mapa de salones

    </div>

    <div class="nav-section-label">Finanzas</div>
    <div class="nav-item">
      <button class="nav-link" onclick="navigate('pagos')">
        <i class="bi bi-credit-card-fill"></i> Pagos
      </button>
    </div>
    <div class="nav-item">
      <button class="nav-link" onclick="navigate('servicios')">

      </button>
    </div>

  <div class="sidebar-footer">
    <div class="user-info">
      <div class="user-avatar">A</div>

  </div>
</nav>

<!-- ══════════════════════════════════════════════════════════
     TOPBAR
══════════════════════════════════════════════════════════ -->
<header id="topbar">
  <button class="topbar-btn d-md-none" onclick="toggleSidebar()">
    <i class="bi bi-list"></i>
  </button>
  <div class="page-title" id="page-title">Dashboard</div>
  <div class="topbar-actions">
    <div class="api-status">
      <span class="dot" id="api-dot"></span>
      <span id="api-label" style="font-size:11px">API</span>
    </div>
    <button class="topbar-btn" onclick="refreshCurrentPage()" title="Actualizar">
      <i class="bi bi-arrow-clockwise"></i>
    </button>
    <button class="topbar-btn" title="Configuración">
      <i class="bi bi-gear"></i>
    </button>
  </div>
</header>

<!-- ══════════════════════════════════════════════════════════
     MAIN
══════════════════════════════════════════════════════════ -->
<main id="main">
  <div class="content-area" id="content-area">
    <!-- content injected by JS -->
  </div>
</main>

<!-- ══════════════════════════════════════════════════════════
     MODAL GENÉRICO
══════════════════════════════════════════════════════════ -->
<div class="modal fade modal-dark" id="genericModal" tabindex="-1">
  <div class="modal-dialog modal-dialog-centered modal-lg">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title" id="modalTitle">—</h5>
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body" id="modalBody"></div>
      <div class="modal-footer">
        <button class="btn-outline-custom" data-bs-dismiss="modal">Cancelar</button>
        <button class="btn-accent" id="modalConfirm">Guardar</button>
      </div>
    </div>
  </div>
</div>

<!-- Toast container -->
<div id="toast-container"></div>

<!-- Leaflet JS -->
<script src="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.min.js"></script>
<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<script>
// ══════════════════════════════════════════════════════════════
// CONFIG
// ══════════════════════════════════════════════════════════════
const API = 'http://localhost:8080/api/v1';
let currentPage = 'dashboard';
let bsModal = null;

// ══════════════════════════════════════════════════════════════
// API HELPERS
// ══════════════════════════════════════════════════════════════
async function apiFetch(path, opts = {}) {
  try {
    const res = await fetch(API + path, {
      headers: { 'Content-Type': 'application/json', ...opts.headers },
      ...opts
    });
    if (!res.ok) {
      const err = await res.json().catch(() => ({}));
      throw new Error(err.detail || `Error ${res.status}`);
    }
    if (res.status === 204) return null;
    return res.json();
  } catch (e) {
    throw e;
  }
}

async function checkApiStatus() {
  try {
    await fetch(API.replace('/v1','') + '/actuator/health', { signal: AbortSignal.timeout(2000) });
    document.getElementById('api-dot').classList.remove('offline');
    document.getElementById('api-label').textContent = 'API online';
  } catch {
    document.getElementById('api-dot').classList.add('offline');
    document.getElementById('api-label').textContent = 'API offline';
  }
}

// ══════════════════════════════════════════════════════════════
// TOAST
// ══════════════════════════════════════════════════════════════
function toast(msg, type = 'info') {
  const icons = { success: 'bi-check-circle-fill', error: 'bi-x-circle-fill', info: 'bi-info-circle-fill' };
  const colors = { success: 'var(--success)', error: 'var(--danger)', info: 'var(--accent2)' };
  const el = document.createElement('div');
  el.className = `toast-item ${type}`;
  el.innerHTML = `<i class="bi ${icons[type]}" style="color:${colors[type]};font-size:16px"></i><span>${msg}</span>`;
  document.getElementById('toast-container').appendChild(el);
  setTimeout(() => el.remove(), 3500);
}

// ══════════════════════════════════════════════════════════════
// NAVIGATION
// ══════════════════════════════════════════════════════════════
function navigate(page) {
  currentPage = page;
  document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
  document.querySelectorAll('.nav-link').forEach(l => {
    if (l.getAttribute('onclick')?.includes(`'${page}'`)) l.classList.add('active');
  });
  const titles = {
    dashboard: 'Dashboard', clientes: 'Clientes', salones: 'Salones',
    reservas: 'Reservas', disponibilidad: 'Disponibilidad',
    pagos: 'Pagos', servicios: 'Servicios'
  };
  document.getElementById('page-title').textContent = titles[page] || page;
  pages[page]();
}

function refreshCurrentPage() { navigate(currentPage); }
function toggleSidebar() { document.getElementById('sidebar').classList.toggle('open'); }

// ══════════════════════════════════════════════════════════════
// RENDER HELPERS
// ══════════════════════════════════════════════════════════════
function setContent(html) {
  const el = document.getElementById('content-area');
  el.style.opacity = 0;
  el.innerHTML = html;
  requestAnimationFrame(() => { el.style.transition = 'opacity .2s'; el.style.opacity = 1; });
}

function loading() {
  setContent('<div class="spinner-accent"></div>');
}

function estadoBadge(e) {
  const map = {
    PENDIENTE: 'badge-pendiente', CONFIRMADA: 'badge-confirmada',
    CANCELADA: 'badge-cancelada', FINALIZADA: 'badge-finalizada',
    ACTIVO: 'badge-activo', INACTIVO: 'badge-inactivo',
    MANTENIMIENTO: 'badge-mantenimiento'
  };
  return `<span class="badge-custom ${map[e]||''}">${e}</span>`;
}

function fmtDate(d) { return d ? new Date(d).toLocaleDateString('es-AR') : '—'; }
function fmtMoney(n) { return n != null ? '$' + Number(n).toLocaleString('es-AR') : '—'; }

// Guardamos el callback pendiente para aplicarlo cuando el modal esté visible
let _pendingConfirm = null;

const _modalEl = document.getElementById('genericModal');
_modalEl.addEventListener('show.bs.modal', () => {
  const btn = document.getElementById('modalConfirm');
  if (_pendingConfirm) {
    btn.onclick = _pendingConfirm;
    btn.style.cssText = 'display:inline-flex !important';
  } else {
    btn.onclick = null;
    btn.style.cssText = 'display:none !important';
  }
});

function openModal(title, bodyHtml, onConfirm) {
  _pendingConfirm = onConfirm || null;
  document.getElementById('modalTitle').textContent = title;
  document.getElementById('modalBody').innerHTML = bodyHtml;
  if (!bsModal) bsModal = new bootstrap.Modal(_modalEl);
  bsModal.show();
}
function closeModal() { bsModal?.hide(); }

                <td>${estadoBadge(r.estado)}</td>
                <td>
                  <div class="d-flex gap-1">
                    ${r.estado==='PENDIENTE' ? `<button class="btn-icon" onclick="accionReserva(${r.id},'confirmar')" title="Confirmar"><i class="bi bi-check-lg" style="color:var(--success)"></i></button>` : ''}
                    ${r.estado!=='CANCELADA'&&r.estado!=='FINALIZADA' ? `<button class="btn-icon danger" onclick="accionReserva(${r.id},'cancelar')" title="Cancelar"><i class="bi bi-x-lg"></i></button>` : ''}
                  </div>

function mostrarFormHorario(salonId, nombreSalon) {
  const dias = ['Domingo','Lunes','Martes','Miércoles','Jueves','Viernes','Sábado'];

  const onConfirm = async () => {

      toast('Horario agregado', 'success');

  const body = `

  if (!confirm('¿Eliminar este horario?')) return;

async function initMapa() {
  if (leafletMap) { leafletMap.remove(); leafletMap = null; }

  leafletMap = L.map('map-container').setView([-34.6037, -58.3816], 12);

  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '© <a href="https://openstreetmap.org">OpenStreetMap</a>',
    maxZoom: 19
  }).addTo(leafletMap);

  // Custom dark tile layer style via CSS filter
  document.querySelector('#map-container .leaflet-tile-pane').style.filter =
    'brightness(0.7) invert(1) contrast(1.2) hue-rotate(200deg) saturate(0.5)';

  await cargarTodosLosSalones();
}

async function cargarTodosLosSalones() {
  try {
    const salones = await apiFetch('/salones');
    const conUbicacion = salones.filter(s => s.latitud && s.longitud);

    // Clear old markers
    leafletMarkers.forEach(m => m.remove());
    leafletMarkers = [];

    conUbicacion.forEach(s => agregarMarker(s));

    document.getElementById('mapa-count').textContent = `${conUbicacion.length} con ubicación`;
    renderListaMapa(conUbicacion);

    if (conUbicacion.length > 0) {
      const bounds = conUbicacion.map(s => [s.latitud, s.longitud]);
      leafletMap.fitBounds(bounds, { padding: [40, 40] });
    }
  } catch(e) { toast(e.message, 'error'); }
}

function agregarMarker(salon) {
  const icon = L.divIcon({
    className: '',
    html: `<div style="
      background:#e8a045;color:#0c0e14;
      width:32px;height:32px;border-radius:50% 50% 50% 0;
      transform:rotate(-45deg);display:flex;align-items:center;
      justify-content:center;font-weight:800;font-size:13px;
      border:2px solid #0c0e14;box-shadow:0 2px 8px rgba(0,0,0,.5)
    "><span style="transform:rotate(45deg)"><i class="bi bi-building" style="font-size:14px"></i></span></div>`,
    iconSize: [32, 32],
    iconAnchor: [16, 32],
    popupAnchor: [0, -34]
  });

  const marker = L.marker([salon.latitud, salon.longitud], { icon })
    .addTo(leafletMap)
    .bindPopup(`
      <div style="min-width:180px">
        <span class="map-salon-badge">${salon.estado}</span>
        <div style="font-weight:700;font-size:14px;margin-bottom:4px">${salon.nombre}</div>
        <div style="font-size:12px;color:#8b8fa8;margin-bottom:6px">${salon.direccion || 'Sin dirección'}</div>
        <div style="display:flex;gap:12px;font-size:12px">
          <span><i class="bi bi-people"></i> ${salon.capacidadMax} pax</span>
          <span style="color:#e8a045;font-weight:700">$${Number(salon.precioHora).toLocaleString('es-AR')}/h</span>
        </div>
      </div>
    `);

  leafletMarkers.push(marker);
}

function renderListaMapa(salones) {
  const lista = document.getElementById('mapa-lista');
  if (!lista) return;
  if (salones.length === 0) {
    lista.innerHTML = `<div class="empty-state" style="padding:30px 10px"><i class="bi bi-geo-alt" style="font-size:28px"></i><p>Sin salones con ubicación.</p></div>`;
    return;
  }
  lista.innerHTML = salones.map((s, i) => `
    <div onclick="flyToSalon(${s.latitud},${s.longitud},${i})"
      style="padding:12px;border-bottom:1px solid var(--border);cursor:pointer;transition:background .2s"
      onmouseover="this.style.background='var(--bg-hover)'" onmouseout="this.style.background=''">
      <div style="font-weight:700;font-size:13px;margin-bottom:2px">${s.nombre}</div>
      <div style="font-size:11px;color:var(--text-muted);margin-bottom:4px"><i class="bi bi-geo-alt"></i> ${s.direccion || 'Sin dirección'}</div>
      <div style="display:flex;gap:10px;font-size:11px;font-family:var(--font-mono)">
        <span style="color:var(--text-secondary)">${s.capacidadMax} pax</span>
        <span style="color:var(--accent)">$${Number(s.precioHora).toLocaleString('es-AR')}/h</span>
      </div>
    </div>
  `).join('');
}

function flyToSalon(lat, lng, markerIdx) {
  if (!leafletMap) return;
  leafletMap.flyTo([lat, lng], 16, { duration: 1 });
  setTimeout(() => leafletMarkers[markerIdx]?.openPopup(), 1000);
}

async function buscarCercanos() {
  const lat = document.getElementById('m-lat').value;
  const lng = document.getElementById('m-lng').value;
  const radio = document.getElementById('m-radio').value || 10;
  if (!lat || !lng) return toast('Ingresá las coordenadas o usá "Mi ubicación"', 'info');

  try {
    const salones = await apiFetch(`/salones/cercanos?lat=${lat}&lon=${lng}&radioKm=${radio}`);

    leafletMarkers.forEach(m => m.remove());
    leafletMarkers = [];

    // Marker del usuario
    const userIcon = L.divIcon({
      className: '',
      html: `<div style="width:14px;height:14px;background:#5b7fe8;border-radius:50%;border:3px solid #fff;box-shadow:0 0 0 3px rgba(91,127,232,.4)"></div>`,
      iconSize: [14, 14], iconAnchor: [7, 7]
    });
    L.marker([+lat, +lng], { icon: userIcon }).addTo(leafletMap)
      .bindPopup('<div style="font-weight:700">📍 Tu ubicación</div>');

    // Círculo de radio
    L.circle([+lat, +lng], {
      radius: radio * 1000,
      color: '#5b7fe8', fillColor: '#5b7fe8',
      fillOpacity: 0.05, weight: 1.5, dashArray: '6 4'
    }).addTo(leafletMap);

    salones.forEach(s => agregarMarker(s));

    document.getElementById('mapa-count').textContent = `${salones.length} encontrados`;
    renderListaMapa(salones);
    toast(`${salones.length} salones en ${radio} km`, 'success');

    if (salones.length > 0) {
      const bounds = [[+lat, +lng], ...salones.map(s => [s.latitud, s.longitud])];
      leafletMap.fitBounds(bounds, { padding: [40, 40] });
    } else {
      leafletMap.setView([+lat, +lng], 13);
    }
  } catch(e) { toast(e.message, 'error'); }
}

function usarMiUbicacion() {
  if (!navigator.geolocation) return toast('Tu browser no soporta geolocalización', 'error');
  navigator.geolocation.getCurrentPosition(pos => {
    document.getElementById('m-lat').value = pos.coords.latitude.toFixed(6);
    document.getElementById('m-lng').value = pos.coords.longitude.toFixed(6);
    toast('Ubicación obtenida', 'success');
    if (leafletMap) leafletMap.setView([pos.coords.latitude, pos.coords.longitude], 13);
  }, () => toast('No se pudo obtener la ubicación', 'error'));
}
