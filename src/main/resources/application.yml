spring:
  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 6MB

  datasource:
    url: jdbc:postgresql://localhost:5432/appdb
    username: admin
    password: admin123
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        default_schema: public

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

server:
  port: 8080
  servlet:
    context-path: /api

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha
  info:
    title: Salón de Fiestas API
    version: 1.0.0
    description: API REST para gestión de reservas de salón de fiestas

salon:
  imagenes:
    max-size-bytes: 5242880
    allowed-content-types:
      - image/jpeg
      - image/png
      - image/webp
      - image/gif

logging:
  level:
    com.salon.fiestas: DEBUG
    org.springframework.security: INFO
