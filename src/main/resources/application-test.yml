spring:
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
    username: sa
    password:
    driver-class-name: org.h2.Driver

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true

  flyway:
    enabled: false

salon:
  imagenes:
    max-size-bytes: 5242880
    allowed-content-types:
      - image/jpeg
      - image/png
      - image/webp
      - image/gif
